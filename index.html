<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>عرض ملفات 3D + AR</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 20px;
      padding: 20px;
      background-color: #f0f0f0;
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      padding: 16px;
      width: 300px;
      text-align: center;
    }
    model-viewer {
      width: 100%;
      height: 300px;
      border-radius: 8px;
      background-color: #e0e0e0;
    }
    button.ar-button {
      margin-top: 12px;
      padding: 8px 16px;
      border: none;
      background-color: #007aff;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <!-- البطاقة الأولى -->
  <div class="card">
    <h3>الطبق 1</h3>
    <model-viewer 
      id="model1"
      src="pizza1glb-v1.glb" 
      ar 
      ar-modes="webxr scene-viewer quick-look" 
      camera-controls 
      auto-rotate
      interaction-prompt="none"
      shadow-intensity="1">
    </model-viewer>
    <button class="ar-button" onclick="document.getElementById('model1').enterAR()">عرض AR</button>
  </div>

  <!-- البطاقة الثانية -->
  <div class="card">
    <h3>الطبق 2</h3>
    <model-viewer 
      id="model2"
      src="waffel-v5.glb" 
      ar 
      ar-modes="webxr scene-viewer quick-look" 
      camera-controls 
      auto-rotate
      interaction-prompt="none"
      shadow-intensity="1">
    </model-viewer>
    <button class="ar-button" onclick="document.getElementById('model2').enterAR()">عرض AR</button>
  </div>

</body>
</html>
