<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Menu</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        body {
            background-color: #1a1a1a; /* Charcoal */
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: #262626;
            border-radius: 15px;
            padding: 10px;
            border: 1px solid #3741d4; /* Gold */
            width: 300px;
        }

        model-viewer {
            width: 100%;
            height: 300px;
            background-color: #121212;
            border-radius: 10px;
        }

        .ar-button {
            background-color: #00ff84; /* Deep Red */
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 5px;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="card">
        <model-viewer 
            src="w1.usdz" 
            ios-src="W1.usdz" 
            ar 
            ar-modes="webxr scene-viewer quick-look" 
            camera-controls 
            poster="poster1.webp" 
            shadow-intensity="1">
            <button slot="ar-button" class="ar-button">عرض في واقعك المعزز (AR)</button>
        </model-viewer>
    </div>

    <div class="card">
    <model-viewer 
    src="waffel-v5.glb" 
    ar 
    ar-modes="webxr scene-viewer" 
    camera-controls 
    
    tone-mapping="neutral" 
    
    exposure="1.5" 
    
    environment-image="neutral" 
    
    shadow-intensity="2" 
    shadow-softness="0.5"
    
   interaction-prompt="none">
    
    <button slot="ar-button" class="ar-button">
        عرض في واقعك المعزز (AR)
    </button>
</model-viewer>
    </div>

</body>
</html>
